<div class="container mt-4">
  <h2>Liste des Suggestions</h2>

  <!-- Barre de recherche et filtre -->
  <div class="row mb-4">
    <div class="col-md-6">
      <input
        type="text"
        class="form-control"
        placeholder="Rechercher par titre..."
        [(ngModel)]="searchText"
      />
    </div>
    <div class="col-md-6">
      <select class="form-control" [(ngModel)]="selectedCategory">
        <option value="">Toutes les catégories</option>
        <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
      </select>
    </div>
  </div>

  <!-- Liste des suggestions -->
  <div class="row">
    <div class="col-md-6" *ngFor="let suggestion of filteredSuggestions">
      <div class="card mb-3">
        <div class="card-body">
          <h5 class="card-title">{{ suggestion.title }}</h5>
          <h6 class="card-subtitle mb-2 text-muted">
            {{ suggestion.category }}
          </h6>
          <p class="card-text">{{ suggestion.description }}</p>
          <p class="card-text">
            <small class="text-muted">
              {{ suggestion.date | date: "dd/MM/yyyy" }} | Statut:
              {{ suggestion.status }}
            </small>
          </p>
          <p>Likes: {{ suggestion.nbLikes }}</p>

          <!-- Boutons Like et Favoris -->
          <div *ngIf="suggestion.status !== 'refuse'">
            <button
              class="btn btn-primary btn-sm me-2"
              (click)="likeSuggestion(suggestion)"
            >
              👍 Like
            </button>
            <button
              class="btn btn-success btn-sm"
              (click)="addToFavorites(suggestion)"
            >
              ⭐ Ajouter aux favoris
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
